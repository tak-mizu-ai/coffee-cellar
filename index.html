<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coffee Cellar">
  <title>Coffee Cellar</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#1A120B;font-family:'Georgia',serif;color:#E8DDD4;}
    input,select,textarea,button{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    ::-webkit-scrollbar{display:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
"use strict";
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var GAS_URL = "https://script.google.com/macros/s/AKfycbwk-ctBZL3nFO6Fw-mgG_B2Kdb_4scsvAWfLK2wJi3mLlvrlFV620GVtvB4_5tcLyXT/exec";
var ROAST_LEVELS = ["ライト","ミディアム","ミディアムダーク","ダーク"];
var ROAST_COLORS = {"ライト":"#D4A96A","ミディアム":"#A0714F","ミディアムダーク":"#7B4F2E","ダーク":"#3E1F0A"};

// ── ユーティリティ ──
function ym(d){ d=d||new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1); }
function pad(n){ return String(n).padStart(2,"0"); }
function fmtDate(iso){ if(!iso) return "—"; var d=new Date(iso); return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate()); }
function fmtMonth(s){ if(!s) return ""; var p=s.split("-"); return p[0]+"年"+Number(p[1])+"月"; }
function freshDays(r){ return r?Math.floor((Date.now()-new Date(r))/86400000):null; }
function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(k)||"null")||def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

// GAS同期（写真除外でPOST）
function gasPost(beans, budget){
  var beansClean = beans.map(function(b){ var o=Object.assign({},b); delete o.photo; return o; });
  fetch(GAS_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({beans:beansClean, budget:budget, savedAt:new Date().toISOString()})
  }).catch(function(){});
}

// GAS読み込み（写真はlsから補完）
function gasGet(cb){
  fetch(GAS_URL+"?t="+Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text){
      try{
        var data = JSON.parse(text);
        if(data && data.beans && data.beans.length > 0){ cb(data); }
        else{ cb(null); }
      }catch(e){ cb(null); }
    })
    .catch(function(){ cb(null); });
}

// ── コンポーネント ──
function FreshnessBar(props){
  var days=freshDays(props.r); if(days===null) return null;
  var peak=days>=7&&days<=21, stale=days>45;
  var c=stale?"#8B4513":peak?"#4CAF50":"#D4A96A";
  return h("div",{style:{marginTop:6}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9B8E82",marginBottom:3}},
      h("span",null,"焙煎から"+days+"日"),
      h("span",{style:{color:c}},stale?"飲み頃過ぎ":peak?"飲み頃✓":days<7?"ガス抜き中":"良好")
    ),
    h("div",{style:{height:4,background:"#2C2118",borderRadius:2,overflow:"hidden"}},
      h("div",{style:{width:Math.min(100,days/60*100)+"%",height:"100%",background:c,borderRadius:2}})
    )
  );
}

function GramsBar(props){
  var pct=Math.min(100,props.g/props.max*100);
  var c=pct<20?"#E07060":pct<50?"#D4A96A":"#8FBE8A";
  return h("div",{style:{marginTop:4}},
    h("div",{style:{height:6,background:"#2C2118",borderRadius:3,overflow:"hidden"}},
      h("div",{style:{width:pct+"%",height:"100%",background:c,borderRadius:3}})
    ),
    h("div",{style:{fontSize:12,color:c,marginTop:3,fontWeight:600}},props.g+"g 残り")
  );
}

// ── メインアプリ ──
function App(){
  var s_beans   = useState(lsGet("cc_beans",[]));   var beans=s_beans[0];   var setBeans=s_beans[1];
  var s_budget  = useState(lsGet("cc_budget",{}));  var budget=s_budget[0]; var setBudget=s_budget[1];
  var s_view    = useState("list");                  var view=s_view[0];     var setView=s_view[1];
  var s_sel     = useState(null);                    var sel=s_sel[0];       var setSel=s_sel[1];
  var s_loading = useState(true);                    var loading=s_loading[0]; var setLoading=s_loading[1];
  var s_syncing = useState(false);                   var syncing=s_syncing[0]; var setSyncing=s_syncing[1];
  var s_msg     = useState("");                      var msg=s_msg[0];       var setMsg=s_msg[1];

  // フォーム
  var emptyForm = {name:"",origin:"",roaster:"",roastLevel:"ミディアム",grams:"",maxGrams:"",roastedAt:"",purchasedAt:new Date().toISOString().slice(0,10),price:"",pricePerKg:"",notes:"",photo:null};
  var s_form    = useState(emptyForm);               var form=s_form[0];     var setForm=s_form[1];
  var s_edit    = useState(null);                    var editForm=s_edit[0]; var setEditForm=s_edit[1];
  var s_consume = useState("");                      var consume=s_consume[0]; var setConsume=s_consume[1];
  var s_sort    = useState("freshness");             var sortBy=s_sort[0];   var setSortBy=s_sort[1];
  var s_filter  = useState("all");                   var filterRoast=s_filter[0]; var setFilterRoast=s_filter[1];
  var s_bf      = useState({monthly:"",alert:"80"}); var bf=s_bf[0];         var setBf=s_bf[1];

  var fileRef     = useRef();
  var editFileRef = useRef();
  var importRef   = useRef();
  var inited      = useRef(false);

  // 初回：GASからロード
  useEffect(function(){
    if(inited.current) return; inited.current=true;
    gasGet(function(data){
      if(data){
        var local = lsGet("cc_beans",[]);
        var photoMap = {};
        local.forEach(function(b){ if(b.photo) photoMap[b.id]=b.photo; });
        var merged = data.beans.map(function(b){ return Object.assign({},b,{photo:photoMap[b.id]||null}); });
        setBeans(merged); lsSet("cc_beans",merged);
        if(data.budget){ setBudget(data.budget); lsSet("cc_budget",data.budget); }
      }
      setLoading(false);
    });
  },[]);

  // beans変更時：ls保存＋GAS同期
  function saveBeans(newBeans){
    setBeans(newBeans); lsSet("cc_beans",newBeans);
    setSyncing(true);
    gasPost(newBeans, budget);
    setTimeout(function(){ setSyncing(false); },2000);
  }
  function saveBudgetData(newBudget){
    setBudget(newBudget); lsSet("cc_budget",newBudget);
    gasPost(beans, newBudget);
  }

  // メッセージ表示
  function showMsg(text){ setMsg(text); setTimeout(function(){ setMsg(""); },2500); }

  // 豆追加
  function addBean(){
    if(!form.name||!form.grams){ showMsg("名前と残量は必須です"); return; }
    var bean = Object.assign({},form,{
      id: Date.now(),
      grams: Number(form.grams),
      maxGrams: Number(form.maxGrams)||Number(form.grams),
      price: Number(form.price)||null,
      pricePerKg: Number(form.pricePerKg)||null,
      log:[{date:new Date().toISOString(),action:"追加",amount:Number(form.grams)}]
    });
    saveBeans([bean].concat(beans));
    setForm(emptyForm); setView("list"); showMsg("追加しました☕");
  }

  // 豆編集保存
  function saveEdit(){
    if(!editForm||!editForm.name||!editForm.grams){ showMsg("名前と残量は必須です"); return; }
    var newBeans = beans.map(function(b){
      if(b.id!==editForm.id) return b;
      return Object.assign({},b,editForm,{
        grams:Number(editForm.grams), maxGrams:Number(editForm.maxGrams)||Number(editForm.grams),
        price:Number(editForm.price)||null, pricePerKg:Number(editForm.pricePerKg)||null
      });
    });
    saveBeans(newBeans); setEditForm(null); setView("detail"); showMsg("更新しました");
  }

  // 使用記録
  function recordConsume(){
    var amt=Number(consume); if(!amt||!sel) return;
    var newBeans=beans.map(function(b){
      if(b.id!==sel.id) return b;
      var log=(b.log||[]).concat([{date:new Date().toISOString(),action:"使用",amount:-amt}]);
      return Object.assign({},b,{grams:Math.max(0,b.grams-amt),log:log});
    });
    saveBeans(newBeans);
    var updated=newBeans.find(function(b){return b.id===sel.id;});
    setSel(updated); setConsume(""); showMsg(amt+"g 記録しました");
  }

  // 豆削除
  function deleteBean(id){
    if(!confirm("この豆を削除しますか？")) return;
    saveBeans(beans.filter(function(b){return b.id!==id;}));
    setView("list");
  }

  // エクスポート
  function doExport(){
    var data={beans:beans,budget:budget,exportedAt:new Date().toISOString()};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url;
    a.download="coffee-cellar-"+new Date().toISOString().slice(0,10)+".json";
    a.click(); URL.revokeObjectURL(url);
    showMsg("保存しました");
  }

  // インポート
  function doImport(e){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(data.beans){ saveBeans(data.beans); }
        if(data.budget){ saveBudgetData(data.budget); }
        showMsg("✅ 復元しました");
      }catch(err){ showMsg("ファイルエラー"); }
    };
    r.readAsText(file); e.target.value="";
  }

  // 価格自動計算
  function ppk(price,grams){ return price>0&&grams>0?Math.round(price/grams*100):null; }
  function setPrice(val,f,setF){
    var p=Number(val), g=Number(f.maxGrams)||Number(f.grams);
    var pk=ppk(p,g); setF(Object.assign({},f,{price:val,pricePerKg:pk?String(pk):""}));
  }
  function setGrams(field,val,f,setF){
    var g=Number(val), p=Number(f.price);
    var pk=ppk(p,g); setF(Object.assign({},f,{[field]:val,pricePerKg:pk?String(pk):f.pricePerKg}));
  }

  // 予算計算
  var thisMonth = ym();
  var thisSpend = beans.filter(function(b){return b.purchasedAt&&b.purchasedAt.indexOf(thisMonth)===0&&b.price;}).reduce(function(s,b){return s+Number(b.price);},0);
  var bPct = budget.monthly>0?Math.min(100,thisSpend/budget.monthly*100):0;
  var bAlert = budget.monthly>0&&bPct>=(budget.alert||80);
  var bOver  = budget.monthly>0&&thisSpend>budget.monthly;
  var totalG = beans.reduce(function(s,b){return s+b.grams;},0);
  var totalV = beans.reduce(function(s,b){return s+(b.price&&b.maxGrams?Math.round(b.price*(b.grams/b.maxGrams)):0);},0);

  // 月次履歴
  var monthHistory = (function(){
    var arr=[];
    for(var i=5;i>=0;i--){
      var d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
      var m=ym(d);
      var spend=beans.filter(function(b){return b.purchasedAt&&b.purchasedAt.indexOf(m)===0&&b.price;}).reduce(function(s,b){return s+Number(b.price);},0);
      arr.push({m:m,spend:spend});
    }
    return arr;
  })();
  var maxH=Math.max.apply(null,monthHistory.map(function(x){return x.spend;}).concat([budget.monthly||1,1]));

  // ソート・フィルター
  var sorted=beans.filter(function(b){return filterRoast==="all"||b.roastLevel===filterRoast;}).slice().sort(function(a,b){
    if(sortBy==="freshness") return (freshDays(b.roastedAt)||999)-(freshDays(a.roastedAt)||999);
    if(sortBy==="grams") return b.grams-a.grams;
    if(sortBy==="price") return (b.price||0)-(a.price||0);
    return a.name.localeCompare(b.name,"ja");
  });

  // ── スタイル定義 ──
  var C={
    bg:"#1A120B", bg2:"#211510", bg3:"#2C2118", bg4:"#1A0E08",
    gold:"#D4A96A", brown:"#A0714F", red:"#E07060", green:"#8FBE8A",
    text:"#E8DDD4", muted:"#9B8E82", dim:"#6B5A4E",
  };
  function chip(active){ return {background:active?C.gold:C.bg3,color:active?"#1A120B":C.muted,border:"none",borderRadius:20,padding:"5px 14px",fontSize:12,fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap",fontWeight:active?700:400}; }
  var inp={width:"100%",background:C.bg2,border:"1px solid "+C.bg3,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:15,fontFamily:"inherit",boxSizing:"border-box",outline:"none"};
  var sel=Object.assign({},inp,{appearance:"none"});
  var mHead={display:"flex",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid "+C.bg3,position:"sticky",top:0,background:C.bg,zIndex:10};
  var backBtn={background:"none",border:"none",color:C.gold,fontSize:16,cursor:"pointer",padding:"4px 12px 4px 0",fontFamily:"inherit"};
  var primaryBtn={display:"block",width:"calc(100% - 40px)",margin:"16px 20px",background:"linear-gradient(135deg,"+C.gold+","+C.brown+")",color:"#1A120B",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer"};
  var dangerBtn={display:"block",width:"calc(100% - 40px)",margin:"8px 20px",background:"#2C1510",color:C.red,border:"1px solid #5C2518",borderRadius:12,padding:"12px",fontSize:15,fontWeight:600,fontFamily:"inherit",cursor:"pointer"};
  var box={background:C.bg2,borderRadius:10,padding:"10px 14px",border:"1px solid "+C.bg3};
  var lbl={display:"block",fontSize:11,color:C.dim,letterSpacing:2,textTransform:"uppercase",marginBottom:6};

  // ── ローディング ──
  if(loading) return h("div",{style:{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    h("div",{style:{fontSize:48}},"☕"),
    h("div",{style:{color:C.gold,fontSize:16,letterSpacing:2}},"読み込み中...")
  );

  // ── フォーム共通パーツ ──
  function renderForm(f, setF, fileR, onSave, title, onCancel){
    return h("div",{style:{position:"fixed",inset:0,background:C.bg,zIndex:200,overflowY:"auto"}},
      h("div",{style:mHead},
        h("button",{style:backBtn,onClick:onCancel},"← キャンセル"),
        h("span",{style:{fontSize:18,fontWeight:700,color:C.gold,flex:1}},title)
      ),
      // 写真
      h("div",{style:{margin:"0 20px 16px",borderRadius:12,overflow:"hidden",border:"2px dashed "+C.bg3,cursor:"pointer"},onClick:function(){fileR.current.click();}},
        f.photo
          ?h("img",{src:f.photo,alt:"",style:{width:"100%",height:180,objectFit:"cover",display:"block"}})
          :h("div",{style:{height:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#4B3C30"}},
              h("span",{style:{fontSize:40}},"📷"),
              h("span",{style:{fontSize:13,marginTop:8}},"写真を選択（カメラ/ライブラリ）")
            ),
        h("input",{ref:fileR,type:"file",accept:"image/*",style:{display:"none"},onChange:function(e){
          var file=e.target.files[0]; if(!file) return;
          var r=new FileReader(); r.onload=function(ev){setF(Object.assign({},f,{photo:ev.target.result}));}; r.readAsDataURL(file);
        }})
      ),
      // 基本情報
      h("div",{style:{margin:"0 20px 16px"}},h("label",{style:lbl},"豆の名前 *"),h("input",{style:inp,placeholder:"例: エチオピア イルガチェフェ",value:f.name,onChange:function(e){setF(Object.assign({},f,{name:e.target.value}));}})),
      h("div",{style:{margin:"0 20px 16px"}},h("label",{style:lbl},"産地"),h("input",{style:inp,placeholder:"例: エチオピア",value:f.origin||"",onChange:function(e){setF(Object.assign({},f,{origin:e.target.value}));}})),
      h("div",{style:{margin:"0 20px 16px"}},h("label",{style:lbl},"ロースター / 購入先"),h("input",{style:inp,placeholder:"例: Nonstop Coffee",value:f.roaster||"",onChange:function(e){setF(Object.assign({},f,{roaster:e.target.value}));}})),
      h("div",{style:{margin:"0 20px 16px"}},h("label",{style:lbl},"焙煎度"),
        h("select",{style:sel,value:f.roastLevel,onChange:function(e){setF(Object.assign({},f,{roastLevel:e.target.value}));}},
          ROAST_LEVELS.map(function(r){return h("option",{key:r},r);})
        )
      ),
      // 残量
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"0 20px 16px"}},
        h("div",null,h("label",{style:lbl},"残量 (g) *"),h("input",{style:inp,type:"number",placeholder:"200",value:f.grams,onChange:function(e){setGrams("grams",e.target.value,f,setF);}})),
        h("div",null,h("label",{style:lbl},"購入量 (g)"),h("input",{style:inp,type:"number",placeholder:"200",value:f.maxGrams||"",onChange:function(e){setGrams("maxGrams",e.target.value,f,setF);}}))
      ),
      // 価格
      h("div",{style:{margin:"0 20px 16px",background:C.bg4,borderRadius:12,padding:"14px",border:"1px solid #3C2C1C"}},
        h("div",{style:{fontSize:11,color:C.gold,letterSpacing:2,textTransform:"uppercase",marginBottom:12}},"💰 価格"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:f.price&&(Number(f.maxGrams)||Number(f.grams))?10:0}},
          h("div",null,h("label",{style:lbl},"購入価格 (円)"),h("input",{style:inp,type:"number",placeholder:"1500",value:f.price||"",onChange:function(e){setPrice(e.target.value,f,setF);}})),
          h("div",null,h("label",{style:lbl},"単価 (円/100g)"),h("input",{style:Object.assign({},inp,{color:C.gold}),type:"number",placeholder:"自動計算",value:f.pricePerKg||"",onChange:function(e){setF(Object.assign({},f,{pricePerKg:e.target.value}));}}))
        ),
        f.price&&(Number(f.maxGrams)||Number(f.grams))&&h("div",{style:{fontSize:12,color:C.muted,background:C.bg2,borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",marginTop:10}},
          h("span",null,"100g = ¥"+Math.round(Number(f.price)/(Number(f.maxGrams)||Number(f.grams))*100).toLocaleString()),
          budget.monthly>0&&h("span",{style:{color:Number(f.price)+thisSpend>budget.monthly?C.red:C.green}},"残予算 ¥"+Math.max(0,budget.monthly-thisSpend).toLocaleString())
        )
      ),
      // 日付
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"0 20px 16px"}},
        h("div",null,h("label",{style:lbl},"焙煎日"),h("input",{style:Object.assign({},inp,{colorScheme:"dark"}),type:"date",value:f.roastedAt||"",onChange:function(e){setF(Object.assign({},f,{roastedAt:e.target.value}));}})),
        h("div",null,h("label",{style:lbl},"購入日"),h("input",{style:Object.assign({},inp,{colorScheme:"dark"}),type:"date",value:f.purchasedAt||"",onChange:function(e){setF(Object.assign({},f,{purchasedAt:e.target.value}));}}))
      ),
      // メモ
      h("div",{style:{margin:"0 20px 16px"}},h("label",{style:lbl},"メモ・フレーバーノート"),h("textarea",{style:Object.assign({},inp,{height:80,resize:"none"}),placeholder:"フルーティ、花のような香り…",value:f.notes||"",onChange:function(e){setF(Object.assign({},f,{notes:e.target.value}));}})),
      h("button",{style:primaryBtn,onClick:onSave},title==="追加"?"追加する":"保存する")
    );
  }

  // ── 追加画面 ──
  if(view==="add") return renderForm(form, setForm, fileRef, addBean, "追加", function(){setView("list");setForm(emptyForm);});

  // ── 編集画面 ──
  if(view==="edit"&&editForm) return renderForm(editForm, setEditForm, editFileRef, saveEdit, "編集", function(){setView("detail");setEditForm(null);});

  // ── 詳細画面 ──
  if(view==="detail"&&sel){
    var bean=beans.find(function(b){return b.id===sel.id;})||sel;
    var php=bean.price&&bean.maxGrams?Math.round(bean.price/bean.maxGrams*100):null;
    var rv=bean.price&&bean.maxGrams?Math.round(bean.price*(bean.grams/bean.maxGrams)):null;
    return h("div",{style:{position:"fixed",inset:0,background:C.bg,zIndex:200,overflowY:"auto"}},
      h("div",{style:mHead},
        h("button",{style:backBtn,onClick:function(){setView("list");}},"← 戻る"),
        h("span",{style:{fontSize:18,fontWeight:700,color:C.gold,flex:1}},"詳細"),
        h("button",{style:{background:"none",border:"1px solid #3C3028",borderRadius:8,color:C.gold,padding:"6px 14px",fontSize:13,fontFamily:"inherit",cursor:"pointer"},onClick:function(){setEditForm(Object.assign({},bean));setView("edit");}},"編集")
      ),
      bean.photo
        ?h("img",{src:bean.photo,alt:bean.name,style:{width:"100%",height:220,objectFit:"cover"}})
        :h("div",{style:{width:"100%",height:120,background:C.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:60}},"☕"),
      h("div",{style:{padding:"16px 20px"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
          h("span",{style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:ROAST_COLORS[bean.roastLevel]||"#888"}}),

      // 今月

          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:C.dim,marginTop:6}},

            h("span",{style:{fontSize:9,color:"#5C4018",position:"absolute",right:0,top:-12}},"予算")

          monthHistory.map(function(item){
            var isThis=item.m===thisMonth;

            return h("div",{key:item.m,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%"}},

                h("div",{style:{width:"100%",height:Math.max(item.spend>0?6:2,pct)+"%",background:bc,borderRadius:"3px 3px 0 0"}})
              ),
              item.spend>0&&h("div",{style:{fontSize:9,color:isThis?C.gold:C.muted,textAlign:"center"}},"¥"+(item.spend>=1000?(item.spend/1000).toFixed(1)+"k":item.spend)),
              h("div",{style:{fontSize:9,color:isThis?C.gold:C.dim,fontWeight:isThis?700:400}},item.m.slice(5)+"月")
            );
          })

      thisMonthBeans.length>0&&h("div",{style:{margin:"0 20px 16px",background:C.bg2,borderRadius:14,padding:"16px",border:"1px solid "+C.bg3}},
        h("div",{style:{fontSize:11,color:C.dim,letterSpacing:2,textTransform:"uppercase",marginBottom:12}},"今月の購入 ("+thisMonthBeans.length+"点)"),
        thisMonthBeans.map(function(b){
          return h("div",{key:b.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid "+C.bg3}},
            h("div",null,
              h("div",{style:{fontSize:14}},b.name),
              h("div",{style:{fontSize:11,color:C.dim}},(b.maxGrams||b.grams)+"g"+(b.pricePerKg?" · ¥"+b.pricePerKg+"/100g":"")+" · "+fmtDate(b.purchasedAt))
            ),
            h("div",{style:{fontSize:16,fontWeight:700,color:C.gold,flexShrink:0,marginLeft:12}},"¥"+Number(b.price).toLocaleString())
          );
        })
      ),
      // 予算設定
      h("div",{style:{margin:"0 20px 16px",background:C.bg2,borderRadius:14,padding:"16px",border:"1px solid "+C.bg3}},
        h("div",{style:{fontSize:11,color:C.dim,letterSpacing:2,textTransform:"uppercase",marginBottom:14}},"予算設定"),
        h("div",{style:{marginBottom:16}},h("label",{style:lbl},"月額予算 (円)"),h("input",{style:inp,type:"number",placeholder:"例: 5000",value:bf.monthly,onChange:function(e){setBf(Object.assign({},bf,{monthly:e.target.value}));}})),
        h("div",null,h("label",{style:lbl},"アラートタイミング"),
          h("div",{style:{display:"flex",gap:8}},

          )

      ),
      h("button",{style:primaryBtn,onClick:function(){saveBudgetData({monthly:Number(bf.monthly)||0,alert:Number(bf.alert)||80});setView("list");showMsg("予算を保存しました");}},"保存する")

  // ── 一覧画面 ──
  var bBarColor=bOver?C.red:bAlert?C.gold:C.green;

    h("div",{style:{background:"linear-gradient(180deg,#0D0805,"+C.bg+")",padding:"20px 20px 0",borderBottom:"1px solid "+C.bg3}},

      h("div",{style:{display:"flex",gap:16,margin:"10px 0 10px",fontSize:12,color:C.muted}},
        h("span",null,beans.length+"種類 · "+totalG+"g"),

      // バックアップボタン

        h("button",{onClick:doExport,style:{flex:1,background:C.bg3,color:C.gold,border:"1px solid #3C3028",borderRadius:10,padding:"8px",fontSize:12,fontFamily:"inherit",cursor:"pointer"}},"⬇ バックアップ保存"),
        h("button",{onClick:function(){importRef.current.click();},style:{flex:1,background:C.bg3,color:C.muted,border:"1px solid #3C3028",borderRadius:10,padding:"8px",fontSize:12,fontFamily:"inherit",cursor:"pointer"}},"⬆ バックアップ復元"),
        h("input",{ref:importRef,type:"file",accept:".json",style:{display:"none"},onChange:doImport})

      // フィルター

        ["all"].concat(ROAST_LEVELS).map(function(r){return h("button",{key:r,style:chip(filterRoast===r),onClick:function(){setFilterRoast(r);}},r==="all"?"すべて":r);})

        return h("button",{key:p[0],style:Object.assign({},chip(sortBy===p[0]),{padding:"4px 10px"}),onClick:function(){setSortBy(p[0]);}},p[1]);

      h("div",{style:{fontSize:48,marginBottom:16}},"☕"),
      h("div",{style:{fontSize:16,marginBottom:8}},"豆がまだありません"),
      h("div",{style:{fontSize:13}},"右下の ＋ から追加しましょう")

        h("div",{style:{padding:"12px 14px",flex:1,minWidth:0}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:ROAST_COLORS[bean.roastLevel]||"#888"}}),

          h("div",{style:{fontSize:11,color:C.dim,marginBottom:4}},bean.roaster+(bean.origin?" · "+bean.origin:"")+(bean.pricePerKg?" · ¥"+bean.pricePerKg+"/100g":"")),
          h(GramsBar,{g:bean.grams,max:bean.maxGrams}),
          bean.roastedAt&&h(FreshnessBar,{r:bean.roastedAt})
        )
      );
    }),
    // FAB
    h("button",{style:{position:"fixed",bottom:24,right:24,width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,"+C.gold+","+C.brown+")",color:"#1A120B",fontSize:32,border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,169,106,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},onClick:function(){setView("add");}},"＋"),

}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
