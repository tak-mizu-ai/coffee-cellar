<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coffee Cellar">
  <title>Coffee Cellar</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #1A120B; font-family: 'Georgia', serif; }
    input, select, textarea, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
const { useState, useRef, useEffect, createElement: h } = React;

var GAS_URL="https://script.google.com/macros/s/AKfycbwk-ctBZL3nFO6Fw-mgG_B2Kdb_4scsvAWfLK2wJi3mLlvrlFV620GVtvB4_5tcLyXT/exec";

const ROAST_LEVELS = ["ライト","ミディアム","ミディアムダーク","ダーク"];
const ROAST_COLORS = {"ライト":"#D4A96A","ミディアム":"#A0714F","ミディアムダーク":"#7B4F2E","ダーク":"#3E1F0A"};

const getCurrentMonth = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); };
const formatDate = (iso) => { if(!iso) return "—"; const d=new Date(iso); return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0"); };
const formatMonth = (ym) => { if(!ym) return ""; const p=ym.split("-"); return p[0]+"年"+Number(p[1])+"月"; };
const freshnessDays = (r) => r ? Math.floor((Date.now()-new Date(r))/86400000) : null;
const calcMonthlySpend = (beans,ym) => beans.filter(b=>b.purchasedAt&&b.purchasedAt.indexOf(ym)===0&&b.price).reduce((s,b)=>s+Number(b.price),0);

function getMonthlyHistory(beans) {
  var result = [];
  for(var i=5;i>=0;i--) {
    var d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    var ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    result.push({ym:ym,spend:calcMonthlySpend(beans,ym)});
  }
  return result;
}

function FreshnessBar(props) {
  var days=freshnessDays(props.roastedAt); if(days===null) return null;
  var peak=days>=7&&days<=21, stale=days>45;
  var color=stale?"#8B4513":peak?"#4CAF50":"#D4A96A";
  var label=stale?"飲み頃過ぎ":peak?"飲み頃 ✓":days<7?"ガス抜き中":"良好";
  return h("div",{style:{marginTop:6}},
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:"#9B8E82",marginBottom:3}},
      h("span",null,"焙煎から "+days+"日"),
      h("span",{style:{color:color}},label)
    ),
    h("div",{style:{height:4,background:"#2C2118",borderRadius:2,overflow:"hidden"}},
      h("div",{style:{width:Math.min(100,(days/60)*100)+"%",height:"100%",background:color,borderRadius:2}})
    )
  );
}

function GramsBar(props) {
  var pct=Math.min(100,(props.grams/props.maxGrams)*100);
  var color=pct<20?"#E07060":pct<50?"#D4A96A":"#8FBE8A";
  return h("div",{style:{marginTop:4}},
    h("div",{style:{height:6,background:"#2C2118",borderRadius:3,overflow:"hidden"}},
      h("div",{style:{width:pct+"%",height:"100%",background:color,borderRadius:3}})
    ),
    h("div",{style:{fontSize:12,color:color,marginTop:3,fontWeight:600}},props.grams+"g 残り")
  );
}

function App() {
  var savedBeans=[]; try{savedBeans=JSON.parse(localStorage.getItem("coffeeInventory")||"[]");}catch(e){}
  var savedBudget={}; try{savedBudget=JSON.parse(localStorage.getItem("coffeeBudget")||"{}");}catch(e){}

  var beanState=useState(savedBeans); var beans=beanState[0]; var setBeans=beanState[1];
  var budgetState=useState(savedBudget); var budget=budgetState[0]; var setBudget=budgetState[1];
  var viewState=useState("list"); var view=viewState[0]; var setView=viewState[1];
  var selState=useState(null); var selected=selState[0]; var setSelected=selState[1];
  var consumeState=useState(""); var consumeAmt=consumeState[0]; var setConsumeAmt=consumeState[1];
  var sortState=useState("freshness"); var sortBy=sortState[0]; var setSortBy=sortState[1];
  var filterState=useState("all"); var filterRoast=filterState[0]; var setFilterRoast=filterState[1];
  var bfState=useState({monthly:"",alert:"80"}); var budgetForm=bfState[0]; var setBudgetForm=bfState[1];

  var today=new Date().toISOString().slice(0,10);
  var formState=useState({name:"",origin:"",roaster:"",roastLevel:"ミディアム",grams:"",maxGrams:"",roastedAt:"",purchasedAt:today,price:"",pricePerKg:"",notes:"",photo:null});
  var form=formState[0]; var setForm=formState[1];

  var fileRef=useRef();
  var importRef=useRef();
  var syncedRef=useRef(false);

  // 初回起動時にGASからデータを復元
  useEffect(function(){
    if(syncedRef.current) return;
    syncedRef.current=true;
    fetch(GAS_URL+"?t="+Date.now()).then(function(r){return r.text();}).then(function(text){
      try{
        var data=JSON.parse(text);
        if(data.beans&&data.beans.length>0){
          setBeans(data.beans);
          if(data.budget) setBudget(data.budget);
        }
      }catch(e){}
    }).catch(function(){});
  },[]);

  useEffect(function(){try{localStorage.setItem("coffeeInventory",JSON.stringify(beans));}catch(e){}},[beans]);
  useEffect(function(){try{localStorage.setItem("coffeeBudget",JSON.stringify(budget));}catch(e){}},[budget]);

  // GASへの自動同期（beans変更時）
  useEffect(function(){
    if(beans.length===0) return;
    var data={beans:beans,budget:budget,savedAt:new Date().toISOString()};
    fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)}).catch(function(){});
  },[beans]);

  function calcPPK(price,grams){return price>0&&grams>0?String(Math.round((price/grams)*100)):"";}
  function handlePriceChange(val){setForm(function(f){return Object.assign({},f,{price:val,pricePerKg:calcPPK(Number(val),Number(f.maxGrams)||Number(f.grams))});});}
  function handleGramsChange(field,val){setForm(function(f){var o=Object.assign({},f);o[field]=val;o.pricePerKg=calcPPK(Number(f.price),Number(val));return o;});}

  function addBean(){
    if(!form.name||!form.grams) return;
    var bean=Object.assign({},form,{id:Date.now(),grams:Number(form.grams),maxGrams:Number(form.maxGrams)||Number(form.grams),price:Number(form.price)||null,pricePerKg:Number(form.pricePerKg)||null,log:[{date:new Date().toISOString(),action:"追加",amount:Number(form.grams)}]});
    setBeans(function(b){return[bean].concat(b);});
    setForm({name:"",origin:"",roaster:"",roastLevel:"ミディアム",grams:"",maxGrams:"",roastedAt:"",purchasedAt:new Date().toISOString().slice(0,10),price:"",pricePerKg:"",notes:"",photo:null});
    setView("list");
  }

  function consume(){
    var amt=Number(consumeAmt); if(!amt||!selected) return;
    setBeans(function(b){return b.map(function(bean){
      if(bean.id!==selected.id) return bean;
      var log=(bean.log||[]).concat([{date:new Date().toISOString(),action:"使用",amount:-amt}]);
      return Object.assign({},bean,{grams:Math.max(0,bean.grams-amt),log:log});
    });});
    setConsumeAmt(""); setView("list");
  }

  function deleteBean(id){setBeans(function(b){return b.filter(function(x){return x.id!==id;});});setView("list");}

  function saveBudget(){setBudget({monthly:Number(budgetForm.monthly)||0,alert:Number(budgetForm.alert)||80});setView("list");}

  function exportData(){
    var data={beans:beans,budget:budget,exportedAt:new Date().toISOString()};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="coffee-cellar-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(data.beans) setBeans(data.beans);
        if(data.budget) setBudget(data.budget);
        alert("✅ インポート完了！");
      }catch(err){alert("ファイルが正しくありません");}
    };
    r.readAsText(file);
    e.target.value="";
  }

  var thisMonth=getCurrentMonth();
  var thisMonthSpend=calcMonthlySpend(beans,thisMonth);
  var budgetPct=budget.monthly>0?Math.min(100,(thisMonthSpend/budget.monthly)*100):0;
  var budgetAlert=budget.monthly>0&&budgetPct>=(budget.alert||80);
  var budgetOver=budget.monthly>0&&thisMonthSpend>budget.monthly;
  var totalGrams=beans.reduce(function(s,b){return s+b.grams;},0);
  var totalValue=beans.reduce(function(s,b){return s+(b.price&&b.maxGrams?Math.round(b.price*(b.grams/b.maxGrams)):0);},0);

  var sorted=beans.filter(function(b){return filterRoast==="all"||b.roastLevel===filterRoast;}).slice().sort(function(a,b){
    if(sortBy==="freshness") return (freshnessDays(b.roastedAt)||999)-(freshnessDays(a.roastedAt)||999);
    if(sortBy==="grams") return b.grams-a.grams;
    if(sortBy==="price") return (b.price||0)-(a.price||0);
    if(sortBy==="name") return a.name.localeCompare(b.name,"ja");
    return 0;
  });

  var S={
    app:{background:"#1A120B",minHeight:"100vh",color:"#E8DDD4",maxWidth:430,margin:"0 auto",paddingBottom:80},
    chip:function(a){return{background:a?"#D4A96A":"#2C2118",color:a?"#1A120B":"#9B8E82",border:"none",borderRadius:20,padding:"5px 14px",fontSize:12,fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap",fontWeight:a?700:400};},
    card:{background:"#211510",margin:"8px 16px",borderRadius:14,overflow:"hidden",border:"1px solid #2C2118",display:"flex",cursor:"pointer"},
    cardImg:{width:90,minHeight:90,objectFit:"cover",background:"#2C2118",flexShrink:0},
    cardImgPh:{width:90,minHeight:90,background:"#2C2118",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28},
    cardBody:{padding:"12px 14px",flex:1,minWidth:0},
    cardName:{fontSize:16,fontWeight:700,color:"#E8DDD4",marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"},
    cardMeta:{fontSize:11,color:"#6B5A4E",marginBottom:4},
    roastDot:function(l){return{display:"inline-block",width:8,height:8,borderRadius:"50%",background:ROAST_COLORS[l]||"#888",marginRight:5};},
    fab:{position:"fixed",bottom:24,right:24,width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,#D4A96A,#A0714F)",color:"#1A120B",fontSize:32,border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(212,169,106,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},
    modal:{position:"fixed",inset:0,background:"#1A120B",zIndex:200,overflowY:"auto"},
    mHead:{display:"flex",alignItems:"center",padding:"16px 20px",borderBottom:"1px solid #2C2118",position:"sticky",top:0,background:"#1A120B",zIndex:10},
    back:{background:"none",border:"none",color:"#D4A96A",fontSize:16,cursor:"pointer",padding:"4px 12px 4px 0",fontFamily:"inherit"},
    mTitle:{fontSize:18,fontWeight:700,color:"#D4A96A",flex:1},
    lbl:{display:"block",fontSize:11,color:"#6B5A4E",letterSpacing:2,textTransform:"uppercase",marginBottom:6},
    inp:{width:"100%",background:"#211510",border:"1px solid #2C2118",borderRadius:10,padding:"10px 14px",color:"#E8DDD4",fontSize:15,fontFamily:"inherit",boxSizing:"border-box",outline:"none"},
    sel:{width:"100%",background:"#211510",border:"1px solid #2C2118",borderRadius:10,padding:"10px 14px",color:"#E8DDD4",fontSize:15,fontFamily:"inherit",boxSizing:"border-box",outline:"none",appearance:"none"},
    photoArea:{margin:"0 20px 16px",borderRadius:12,overflow:"hidden",border:"2px dashed #2C2118",cursor:"pointer"},
    primaryBtn:{display:"block",width:"calc(100% - 40px)",margin:"16px 20px",background:"linear-gradient(135deg,#D4A96A,#A0714F)",color:"#1A120B",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:700,fontFamily:"inherit",cursor:"pointer"},
    dangerBtn:{display:"block",width:"calc(100% - 40px)",margin:"8px 20px",background:"#2C1510",color:"#E07060",border:"1px solid #5C2518",borderRadius:12,padding:"12px",fontSize:15,fontWeight:600,fontFamily:"inherit",cursor:"pointer"},
    box:{background:"#211510",borderRadius:10,padding:"10px 14px",border:"1px solid #2C2118"},
    boxLbl:{fontSize:10,color:"#6B5A4E",letterSpacing:2,textTransform:"uppercase",marginBottom:4},
    boxVal:{fontSize:16,fontWeight:600,color:"#E8DDD4"},
    logItem:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2C2118",fontSize:13},
  };

  // ── BUDGET VIEW ──
  if(view==="budget"){
    var history=getMonthlyHistory(beans);
    var maxH=Math.max.apply(null,history.map(function(m){return m.spend;}).concat([budget.monthly||1,1]));
    var validMonths=history.filter(function(m){return m.spend>0;});
    var avgSpend=validMonths.length>0?Math.round(validMonths.reduce(function(s,m){return s+m.spend;},0)/validMonths.length):0;
    var thisMonthBeans=beans.filter(function(b){return b.purchasedAt&&b.purchasedAt.indexOf(thisMonth)===0&&b.price;});
    return h("div",{style:S.modal},
      h("div",{style:S.mHead},h("button",{style:S.back,onClick:function(){setView("list");}},"← 戻る"),h("span",{style:S.mTitle},"予算管理")),
      h("div",{style:{margin:"16px 20px",background:budgetOver?"#2C1510":budgetAlert?"#21180A":"#211510",borderRadius:14,padding:"18px",border:"1px solid "+(budgetOver?"#5C2518":budgetAlert?"#5C4018":"#2C2118")}},
        h("div",{style:{fontSize:12,color:"#9B8E82",marginBottom:4}},formatMonth(thisMonth)+"の支出"),
        h("div",{style:{fontSize:36,fontWeight:700,color:budgetOver?"#E07060":budgetAlert?"#D4A96A":"#E8DDD4"}},"¥"+thisMonthSpend.toLocaleString()),
        budget.monthly>0?h("div",null,
          h("div",{style:{fontSize:13,color:"#9B8E82",marginTop:6}},"予算 ¥"+budget.monthly.toLocaleString()+" に対して "+budgetPct.toFixed(0)+"% 使用"+(budgetOver?" ⚠ 超過":budgetAlert?" ⚠ アラート":"")),
          h("div",{style:{height:8,background:"#2C2118",borderRadius:4,overflow:"hidden",marginTop:10}},
            h("div",{style:{width:budgetPct+"%",height:"100%",background:budgetOver?"#E07060":budgetAlert?"#D4A96A":"#8FBE8A",borderRadius:4}})
          ),
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6B5A4E",marginTop:6}},
            h("span",null,"残り ¥"+Math.max(0,budget.monthly-thisMonthSpend).toLocaleString()),
            h("span",null,"平均 ¥"+avgSpend.toLocaleString()+"/月")
          )
        ):h("div",{style:{fontSize:13,color:"#6B5A4E",marginTop:8}},"下の設定から月額予算を登録できます")
      ),
      h("div",{style:{margin:"0 20px 16px",background:"#211510",borderRadius:14,padding:"16px",border:"1px solid #2C2118"}},
        h("div",{style:{fontSize:11,color:"#6B5A4E",letterSpacing:2,textTransform:"uppercase",marginBottom:14}},"過去6ヶ月の支出"),
        h("div",{style:{display:"flex",alignItems:"flex-end",gap:6,height:110,position:"relative"}},
          budget.monthly>0&&h("div",{style:{position:"absolute",left:0,right:0,bottom:(budget.monthly/maxH)*100+"%",borderTop:"1px dashed #5C4018"}},
            h("span",{style:{fontSize:9,color:"#5C4018",position:"absolute",right:0,top:-12}},"予算")
          ),
          history.map(function(item){
            var isThis=item.ym===thisMonth;
            var over=budget.monthly>0&&item.spend>budget.monthly;
            var barColor=over?"#E07060":isThis?"#D4A96A":"#4A3525";
            var pct=(item.spend/maxH)*100;
            return h("div",{key:item.ym,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%"}},
              h("div",{style:{flex:1,width:"100%",display:"flex",alignItems:"flex-end"}},
                h("div",{style:{width:"100%",height:Math.max(item.spend>0?6:2,pct)+"%",background:barColor,borderRadius:"3px 3px 0 0"}})
              ),
              item.spend>0&&h("div",{style:{fontSize:9,color:isThis?"#D4A96A":"#9B8E82",textAlign:"center"}},"¥"+(item.spend>=1000?(item.spend/1000).toFixed(1)+"k":item.spend)),
              h("div",{style:{fontSize:9,color:isThis?"#D4A96A":"#6B5A4E",fontWeight:isThis?700:400}},item.ym.slice(5)+"月")
            );
          })
        )
      ),
      thisMonthBeans.length>0&&h("div",{style:{margin:"0 20px 16px",background:"#211510",borderRadius:14,padding:"16px",border:"1px solid #2C2118"}},
        h("div",{style:{fontSize:11,color:"#6B5A4E",letterSpacing:2,textTransform:"uppercase",marginBottom:12}},"今月の購入 ("+thisMonthBeans.length+"点)"),
        thisMonthBeans.map(function(b){
          return h("div",{key:b.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #2C2118"}},
            h("div",null,
              h("div",{style:{fontSize:14,color:"#E8DDD4"}},b.name),
              h("div",{style:{fontSize:11,color:"#6B5A4E"}},b.maxGrams+"g"+(b.pricePerKg?" · ¥"+b.pricePerKg+"/100g":"")+" · "+formatDate(b.purchasedAt))
            ),
            h("div",{style:{fontSize:16,fontWeight:700,color:"#D4A96A",flexShrink:0,marginLeft:12}},"¥"+Number(b.price).toLocaleString())
          );
        })
      ),
      h("div",{style:{margin:"0 20px 16px",background:"#211510",borderRadius:14,padding:"16px",border:"1px solid #2C2118"}},
        h("div",{style:{fontSize:11,color:"#6B5A4E",letterSpacing:2,textTransform:"uppercase",marginBottom:14}},"予算設定"),
        h("div",{style:{marginBottom:16}},
          h("label",{style:S.lbl},"月額予算 (円)"),
          h("input",{style:S.inp,type:"number",placeholder:"例: 5000",value:budgetForm.monthly,onChange:function(e){setBudgetForm(function(f){return Object.assign({},f,{monthly:e.target.value});});}})
        ),
        h("div",null,
          h("label",{style:S.lbl},"アラートタイミング"),
          h("div",{style:{display:"flex",gap:8}},
            [60,70,80,90].map(function(v){
              return h("button",{key:v,onClick:function(){setBudgetForm(function(f){return Object.assign({},f,{alert:String(v)});});},style:Object.assign({},S.chip(String(budgetForm.alert)===String(v)),{flex:1})},v+"%");
            })
          )
        )
      ),
      h("button",{style:S.primaryBtn,onClick:saveBudget},"保存する")
    );
  }

  // ── ADD VIEW ──
  if(view==="add") return h("div",{style:S.modal},
    h("div",{style:S.mHead},h("button",{style:S.back,onClick:function(){setView("list");}},"← 戻る"),h("span",{style:S.mTitle},"豆を追加")),
    h("div",{style:S.photoArea,onClick:function(){fileRef.current.click();}},
      form.photo
        ?h("img",{src:form.photo,alt:"",style:{width:"100%",height:180,objectFit:"cover",display:"block"}})
        :h("div",{style:{height:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#4B3C30"}},
            h("span",{style:{fontSize:40}},"📷"),
            h("span",{style:{fontSize:13,marginTop:8}},"タップして写真を選択")
          ),
      h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:function(e){
        var f2=e.target.files[0]; if(!f2) return;
        var r=new FileReader(); r.onload=function(ev){setForm(function(f){return Object.assign({},f,{photo:ev.target.result});});}; r.readAsDataURL(f2);
      }})
    ),
    h("div",{style:{margin:"0 20px 16px"}},h("label",{style:S.lbl},"豆の名前 *"),h("input",{style:S.inp,placeholder:"例: エチオピア イルガチェフェ",value:form.name,onChange:function(e){setForm(function(f){return Object.assign({},f,{name:e.target.value});});}})),
    h("div",{style:{margin:"0 20px 16px"}},h("label",{style:S.lbl},"産地"),h("input",{style:S.inp,placeholder:"例: エチオピア",value:form.origin,onChange:function(e){setForm(function(f){return Object.assign({},f,{origin:e.target.value});});}})),
    h("div",{style:{margin:"0 20px 16px"}},h("label",{style:S.lbl},"ロースター / 購入先"),h("input",{style:S.inp,placeholder:"例: Nonstop Coffee",value:form.roaster,onChange:function(e){setForm(function(f){return Object.assign({},f,{roaster:e.target.value});});}})),
    h("div",{style:{margin:"0 20px 16px"}},h("label",{style:S.lbl},"焙煎度"),h("select",{style:S.sel,value:form.roastLevel,onChange:function(e){setForm(function(f){return Object.assign({},f,{roastLevel:e.target.value});});}},ROAST_LEVELS.map(function(r){return h("option",{key:r},r);}))),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"0 20px 16px"}},
      h("div",null,h("label",{style:S.lbl},"現在の残量 (g) *"),h("input",{style:S.inp,type:"number",placeholder:"200",value:form.grams,onChange:function(e){handleGramsChange("grams",e.target.value);}})),
      h("div",null,h("label",{style:S.lbl},"購入量 (g)"),h("input",{style:S.inp,type:"number",placeholder:"200",value:form.maxGrams,onChange:function(e){handleGramsChange("maxGrams",e.target.value);}}))
    ),
